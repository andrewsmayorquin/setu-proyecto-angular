<main class="login-container">
  <section class="login-card">

    <header>
      <div class="logo" aria-hidden="true">SETU</div>
      <h1 id="login-title">
        Sistema de Evaluación de Ternas Universitarias
      </h1>
    </header>

    <form
      [formGroup]="form"
      (ngSubmit)="submit()"
      aria-labelledby="login-title">

      <fieldset>
        <legend>Acceso al sistema</legend>

        <div class="field">
          <label for="username">Usuario</label>
          <input
            id="username"
            type="text"
            placeholder="admin"
            formControlName="username"
            autocomplete="username"
            required />
        </div>

        <div class="field">
          <label for="password">Contraseña</label>
          <input
            id="password"
            type="password"
            placeholder="admin"
            formControlName="password"
            autocomplete="current-password"
            required />
        </div>

      </fieldset>

      @if (errorMessage()) {
        <p
          class="error"
          role="alert"
          aria-live="assertive">
          {{ errorMessage() }}
        </p>
      }

      <button
        class="btn-login"
        type="submit"
        [disabled]="form.invalid"
        [attr.aria-disabled]="form.invalid">
        Iniciar sesión
      </button>

    </form>

  </section>
</main>
