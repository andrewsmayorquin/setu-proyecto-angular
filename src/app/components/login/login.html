<div class="login-container" role="main">
  <form class="login-card" [formGroup]="form" (ngSubmit)="submit()" aria-labelledby="login-title">
    <div class="logo" aria-hidden="true">SETU</div>
    <h1 id="login-title" class="subtitle">Sistema de Evaluación de Ternas Universitarias</h1>

    <label class="field">
      <span>Usuario</span>
      <input type="text" placeholder="admin" formControlName="username" autocomplete="username" />
    </label>

    <label class="field">
      <span>Contraseña</span>
      <input type="password" placeholder="admin" formControlName="password" autocomplete="current-password" />
    </label>

    @if (errorMessage()) {
      <p class="error" role="alert" aria-live="assertive">{{ errorMessage() }}</p>
    }

    <button class="btn-login" type="submit" [disabled]="form.invalid" [attr.aria-disabled]="form.invalid">
      Iniciar sesión
    </button>
  </form>
</div>
