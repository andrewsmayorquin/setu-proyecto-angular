<aside class="sidebar" aria-label="Menú principal">
  <header class="sidebar-logo">
    <h2>SETU</h2>
  </header>

  @if (isAuthenticated()) {

    <nav class="sidebar-nav" aria-label="Navegación principal">

      <a
        class="nav-item"
        routerLink="/home"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: true }">
        Panel de control
      </a>

      @if (isAdmin()) {

        <a
          class="nav-item"
          routerLink="/ternas"
          routerLinkActive="active">
          Ternas
        </a>

        <a
          class="nav-item"
          routerLink="/estudiantes"
          routerLinkActive="active">
          Estudiantes
        </a>

        <a
          class="nav-item"
          routerLink="/evaluadores"
          routerLinkActive="active">
          Evaluadores
        </a>

        <a
          class="nav-item"
          routerLink="/resultados"
          routerLinkActive="active">
          Resultados
        </a>

      }

      <a
        class="nav-item"
        routerLink="/evaluacion"
        routerLinkActive="active">
        Evaluación
      </a>

    </nav>

    <footer class="sidebar-footer">

      <p>
        {{ session()?.name }}
      </p>

      <button
        type="button"
        (click)="logout()">
        Salir
      </button>

    </footer>

  }

</aside>
